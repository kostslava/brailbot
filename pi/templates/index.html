<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrailBox Kiosk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #151515;
      --bg-soft: #2f2f31;
      --text: #f3f1ef;
      --text-soft: rgba(243, 241, 239, 0.88);
      --text-muted: rgba(243, 241, 239, 0.72);
      --border-soft: rgba(255, 255, 255, 0.14);
      --button-bg: #f3f3f3;
      --button-text: #111111;
      --glow: rgba(212, 121, 18, 0.45);
      --glow-soft: rgba(212, 121, 18, 0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", Arial, sans-serif;
      background:
        radial-gradient(circle at 82% 10%, var(--glow) 0%, transparent 18%),
        radial-gradient(circle at 10% 58%, var(--glow-soft) 0%, transparent 22%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 380px;
      flex-shrink: 0;
      border-right: 1px solid var(--border-soft);
      padding: 2rem 1.5rem;
      overflow-y: auto;
      max-height: 100vh;
      background: rgba(21,21,21,0.6);
    }
    .sidebar h2 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }
    .story-card {
      padding: 1rem;
      margin-bottom: 0.75rem;
      background: var(--bg-soft);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .story-card:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-1px); }
    .story-card.active { border-color: rgba(212,121,18,0.6); }
    .story-card.playing { opacity: 0.6; pointer-events: none; }
    .story-summary {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.4;
      color: var(--text-soft);
    }
    .story-tags {
      margin-top: 0.4rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 500;
      line-height: 0.95;
      margin-bottom: 0.75rem;
    }
    .status {
      font-size: 0.85rem;
      color: var(--text-muted);
      min-height: 1.2rem;
      margin-bottom: 1.5rem;
    }
    .output-area {
      width: 100%;
      max-width: 600px;
      min-height: 100px;
      max-height: 350px;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      background: var(--bg-soft);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.3rem;
      line-height: 1.6;
      color: var(--text-soft);
      word-break: break-word;
      margin-bottom: 1.5rem;
    }
    .braille-display {
      font-family: monospace;
      font-size: 3rem;
      letter-spacing: 0.3em;
      color: var(--text);
      background: var(--bg-soft);
      border: 1px solid var(--border-soft);
      border-radius: 20px;
      padding: 0.75rem 2rem;
      min-width: 4rem;
      min-height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pick-prompt {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.2rem;
      color: var(--text-muted);
    }
    .dev-panel {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: var(--bg-soft);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      padding: 0.6rem 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      z-index: 100;
    }
    .dev-panel input {
      width: 2.5rem;
      text-align: center;
      background: var(--bg);
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      color: var(--text);
      padding: 0.25rem;
      font-size: 0.85rem;
      font-family: monospace;
    }
    .dev-panel button {
      background: var(--border-soft);
      border: none;
      border-radius: 6px;
      color: var(--text-muted);
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .dev-panel button:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Pick a story</h2>
    <div id="storyList"></div>
  </div>

  <div class="main">
    <h1>BrailBox</h1>
    <div class="status" id="status"></div>
    <div class="output-area" id="output"><span class="pick-prompt">← Pick a story from the list</span></div>
    <div class="braille-display" id="brailleChar">&nbsp;</div>
  </div>

  <div class="dev-panel">
    <span>dev</span>
    <input type="text" id="devChar" maxlength="1" placeholder="a">
    <button id="devSend">Send</button>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io();
    const storyList = document.getElementById('storyList');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const brailleEl = document.getElementById('brailleChar');

    let playing = false;
    let activeCard = null;

    fetch('/api/stories')
      .then(r => r.json())
      .then(stories => {
        stories.forEach(s => {
          const card = document.createElement('div');
          card.className = 'story-card';
          card.dataset.id = s.id;
          card.innerHTML = '<div class="story-summary">' + s.summary + '</div>'
            + '<div class="story-tags">' + s.theme + ' · ' + s.mood + '</div>';
          card.addEventListener('click', () => playStory(s.id, card));
          storyList.appendChild(card);
        });
      });

    function playStory(id, card) {
      if (playing) return;
      playing = true;

      if (activeCard) activeCard.classList.remove('active');
      activeCard = card;
      card.classList.add('active', 'playing');

      document.querySelectorAll('.story-card').forEach(c => {
        if (c !== card) c.classList.add('playing');
      });

      outputEl.textContent = '';
      brailleEl.innerHTML = '&nbsp;';
      socket.emit('play_story', { id, sid: socket.id });
    }

    socket.on('status', (data) => {
      statusEl.textContent = data.message;
      if (data.message === 'Done.' || data.message === 'Story not found.') {
        playing = false;
        document.querySelectorAll('.story-card').forEach(c => c.classList.remove('playing'));
      }
    });

    socket.on('clear_braille', () => {
      outputEl.textContent = '';
      brailleEl.innerHTML = '&nbsp;';
    });

    document.getElementById('devSend').addEventListener('click', () => {
      const ch = document.getElementById('devChar').value;
      if (ch) socket.emit('test_char', { char: ch });
    });
    document.getElementById('devChar').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('devSend').click();
    });

    socket.on('braille_char', (data) => {
      outputEl.textContent += data.char;
      brailleEl.textContent = data.char;
      outputEl.scrollTop = outputEl.scrollHeight;
    });
  </script>
</body>
</html>
