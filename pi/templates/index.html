<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrailBox Kiosk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #151515;
      --bg-soft: #2f2f31;
      --text: #f3f1ef;
      --text-soft: rgba(243, 241, 239, 0.88);
      --text-muted: rgba(243, 241, 239, 0.72);
      --border-soft: rgba(255, 255, 255, 0.14);
      --button-bg: #f3f3f3;
      --button-text: #111111;
      --glow: rgba(212, 121, 18, 0.45);
      --glow-soft: rgba(212, 121, 18, 0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", Arial, sans-serif;
      background:
        radial-gradient(circle at 82% 10%, var(--glow) 0%, transparent 18%),
        radial-gradient(circle at 10% 58%, var(--glow-soft) 0%, transparent 22%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 500;
      line-height: 0.95;
      margin-bottom: 0.75rem;
    }
    .subtitle {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }
    .input-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 1.5rem;
    }
    .text-input {
      flex: 1;
      min-height: 56px;
      padding: 0 24px;
      font-size: 1.05rem;
      background: var(--bg-soft);
      color: var(--text);
      border: 1px solid transparent;
      border-radius: 999px;
      outline: none;
      transition: border-color 0.2s;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }
    .text-input::placeholder { color: rgba(255,255,255,0.35); }
    .text-input:focus { border-color: rgba(255,255,255,0.18); }
    .send-btn {
      min-width: 120px;
      min-height: 56px;
      padding: 0 28px;
      border: none;
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--button-text);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
    }
    .send-btn:hover { transform: translateY(-2px); }
    .send-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
    .status {
      font-size: 0.85rem;
      color: var(--text-muted);
      min-height: 1.2rem;
      margin-bottom: 1.5rem;
    }
    .output-area {
      width: 100%;
      max-width: 600px;
      min-height: 80px;
      padding: 1rem 1.5rem;
      background: var(--bg-soft);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.3rem;
      line-height: 1.6;
      color: var(--text-soft);
      word-break: break-word;
      margin-bottom: 1.5rem;
    }
    .braille-display {
      font-family: monospace;
      font-size: 3rem;
      letter-spacing: 0.3em;
      color: var(--text);
      background: var(--bg-soft);
      border: 1px solid var(--border-soft);
      border-radius: 20px;
      padding: 0.75rem 2rem;
      min-width: 4rem;
      min-height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h1>BrailBox</h1>
  <p class="subtitle">Type text and watch it become braille</p>

  <div class="input-row">
    <input type="text" class="text-input" id="textInput" placeholder="Type something..." autofocus>
    <button class="send-btn" id="sendBtn">Send</button>
  </div>

  <div class="status" id="status"></div>
  <div class="output-area" id="output"></div>
  <div class="braille-display" id="brailleChar">&nbsp;</div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io();
    const input = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const brailleEl = document.getElementById('brailleChar');

    let playing = false;

    function send() {
      const text = input.value.trim();
      if (!text || playing) return;
      playing = true;
      sendBtn.disabled = true;
      outputEl.textContent = '';
      brailleEl.innerHTML = '&nbsp;';
      socket.emit('send_text', { text, sid: socket.id });
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });

    socket.on('status', (data) => {
      statusEl.textContent = data.message;
      if (data.message === 'Done.') {
        playing = false;
        sendBtn.disabled = false;
        input.value = '';
        input.focus();
      }
    });

    socket.on('clear', () => {
      outputEl.textContent = '';
      brailleEl.innerHTML = '&nbsp;';
    });

    socket.on('braille_char', (data) => {
      outputEl.textContent += data.char;
      brailleEl.textContent = data.char;
    });
  </script>
</body>
</html>
